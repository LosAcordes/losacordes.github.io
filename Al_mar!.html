<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Al mar!</title>
  <link rel="stylesheet" href="style.css"/>
  <script type="text/javascript" src="darkmode.js" defer></script>
</head>

<div class="page">
  <body>
    <header>
      <button id="theme-switch">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z"/></svg>
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M480-280q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-280ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Z"/></svg>
      </button>
      <a href="index.html">⌂ Inicio</a>
      <h1>Al mar!</h1>
      <hr/>
    </header>

    <main>
      <div class="info">
        <p>Manel</p>
        <p>Dm</p>
        <p>150 BPM</p>
      </div>

      <div class="chords-scroll">
        <p class="chords">
          Dm - F - C - Bb
          (Igual que Tobogàn)
        </p>
      </div>

      <div class="player">
        <audio id="audio" src="audio/Al_mar!.mp3"></audio>
        <button id="button">▶</button>
        <input type="range" id="bar" value="0">
        <span id="time">0:00 / 0:00</span>
      </div>

      <p class="lyrics">
        Tu i jo hem sopat en bons restaurants
        Tu i jo hem ballat a la llum d’un fanal
        Tu i jo volavem en un ford fiesta groc
        Tu i jo hem cantat a la vora del foc
      </p>

      <script>
        const audio = document.getElementById("audio"),
              button = document.getElementById("button"),
              bar = document.getElementById("bar"),
              time = document.getElementById("time"),
              fmt = s => Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2, '0');

        button.onclick = () => { audio.paused ? audio.play() : audio.pause(); button.innerText = audio.paused ? "▶" : "❚❚"; };
        audio.onloadedmetadata = () => bar.max = audio.duration;
        audio.ontimeupdate = () => { bar.value = audio.currentTime; time.innerText = fmt(audio.currentTime) + " / " + fmt(audio.duration || 0); };
        bar.oninput = () => audio.currentTime = bar.value;
      </script>

    </main>
  </body>
</div>
</html>
